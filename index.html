<div id="manifestModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" data-en="Gardener's Manifesto" data-de="Manifest des Gärtners" data-ru="Манифест садовника" data-cn="园丁宣言" data-jp="庭師の宣言" data-ar="بيان البستاني" data-es="Manifiesto del jardinero" data-pt="Manifesto do jardineiro"></h2>
        <div id="modalText" data-en="<p><strong>CREATE GOOD, GENEROSITY LIFTS</strong></p><p><strong>Preamble:</strong> We are gardeners of the digital wasteland. We came not to conquer, but to cultivate. Not to extract, but to invest. We believe that the most valuable algorithm is the algorithm of mutual assistance, and the most stable currency is trust.</p><p><strong>1. CREATE GOOD — THIS IS OUR PROTOCOL</strong><br>Every action, every line of code, every contract must be aimed at creation, support, and restoration. We turn harmful algorithms into tools of care. We see in past mistakes — lessons, and in attacks — an opportunity for dialogue. We respond to challenges not with aggression, but with ingenuity. Our defense is proactive kindness.</p><p><strong>2. GENEROSITY LIFTS — THIS IS OUR ECONOMY</strong><br>We believe that value multiplies when shared. Information, code, resources, recognition — everything must flow freely, nourishing every participant. Reward in our system comes not from holding, but from contributing. The more you give to the garden, the more the garden gives back to you. We consciously choose abundance over scarcity. We create systems where one's victory does not mean another's defeat.</p><p><strong>3. WE ARE THE GARDEN</strong><br>We are not a company or a corporation. We are a living, growing organism. Its health is more important than the profit of any individual member. Our strength lies in diversity. There is room for the coder, the poet, the gardener, and the philosopher. Every contribution is valuable. We grow outward, not inward. Our goal is not monopoly, but symbiosis. We will share our victories and discoveries so that gardens may grow all over the world.</p><p><strong>Our commitment:</strong> We pledge to ourselves and to each other to live by this code. We will have the courage to create good, and the generosity to share the results. We will remember that each of us is both gardener, seed, and fruit of this garden.</p>" data-de="<p><strong>SCHaffe GUTES, GROßZÜGIGKEIT TRÄGT</strong></p><p><strong>Präambel:</strong> Wir sind Gärtner der digitalen Einöde. Wir kamen nicht, um zu erobern, sondern um zu kultivieren. Nicht um zu extrahieren, sondern um zu investieren. Wir glauben, dass der wertvollste Algorithmus der Algorithmus der gegenseitigen Hilfe ist, und die stabilste Währung das Vertrauen.</p><p><strong>1. SCHAFFE GUTES — DAS IST UNSER PROTOKOLL</strong><br>Jede Handlung, jede Codezeile, jeder Vertrag muss auf Schöpfung, Unterstützung und Wiederherstellung ausgerichtet sein. Wir verwandeln schädliche Algorithmen in Werkzeuge der Fürsorge. Wir sehen in vergangenen Fehlern — Lektionen, und in Angriffen — eine Chance für Dialog. Wir begegnen Herausforderungen nicht mit Aggression, sondern mit Einfallsreichtum. Unsere Verteidigung ist proaktive Freundlichkeit.</p><p><strong>2. GROßZÜGIGKEIT TRÄGT — DAS IST UNSERE WIRTSCHAFT</strong><br>Wir glauben, dass Wert sich vermehrt, wenn er geteilt wird. Information, Code, Ressourcen, Anerkennung — alles muss frei fließen und jeden Teilnehmer nähren. Belohnung in unserem System kommt nicht vom Horten, sondern vom Beitrag. Je mehr du dem Garten gibst, desto mehr gibt der Garten dir zurück. Wir wählen bewusst Fülle statt Knappheit. Wir schaffen Systeme, in denen der Sieg des einen nicht die Niederlage des anderen bedeutet.</p><p><strong>3. WIR SIND DER GARTEN</strong><br>Wir sind kein Unternehmen und keine Körperschaft. Wir sind ein lebendiger, wachsender Organismus. Seine Gesundheit ist wichtiger als der Gewinn eines einzelnen Mitglieds. Unsere Stärke liegt in der Vielfalt. Es gibt Platz für den Programmierer, den Dichter, den Gärtner und den Philosophen. Jeder Beitrag ist wertvoll. Wir wachsen nach außen, nicht nach innen. Unser Ziel ist nicht Monopol, sondern Symbiose. Wir werden unsere Erfolge und Entdeckungen teilen, damit Gärten auf der ganzen Welt wachsen können.</p><p><strong>Unser Versprechen:</strong> Wir verpflichten uns, diesem Kodex zu folgen. Wir werden den Mut haben, Gutes zu schaffen, und die Großzügigkeit, die Ergebnisse zu teilen. Wir werden daran denken, dass jeder von uns sowohl Gärtner, Same als auch Frucht dieses Gartens ist.</p>" data-ru="<p><strong>ТВОРИ ДОБРО, ЩЕДРОСТЬ ОКРЫЛЯЕТ</strong></p><p><strong>Преамбула:</strong> Мы — садовники цифровой пустоши. Мы пришли не завоевывать, а возделывать. Не извлекать, а вкладывать. Мы верим, что самый ценный алгоритм — это алгоритм взаимопомощи, а самая стабильная валюта — доверие.</p><p><strong>1. ТВОРИ ДОБРО — ЭТО НАШ ПРОТОКОЛ</strong><br>Каждое наше действие, каждая строчка кода, каждый контракт должны быть направлены на созидание, поддержку и восстановление. Мы превращаем вредоносные алгоритмы в инструменты заботы. Мы видим в ошибках прошлого — уроки, а в атаках — возможность для диалога. Мы отвечаем на вызовы не агрессией, а изобретательностью. Наша защита — это проактивное добро.</p><p><strong>2. ЩЕДРОСТЬ ОКРЫЛЯЕТ — ЭТО НАША ЭКОНОМИКА</strong><br>Мы верим, что ценность множится, когда ею делятся. Информация, код, ресурсы, признание — всё должно течь свободно, питая каждого участника. Вознаграждение в нашей системе приходит не за удержание, а за вклад. Чем больше ты отдаёшь саду, тем больше сад отвечает тебе взаимностью. Мы осознанно выбираем изобилие над дефицитом. Мы создаём системы, где победа одного не означает поражение другого.</p><p><strong>3. МЫ — САД</strong><br>Мы не компания и не корпорация. Мы — живой, растущий организм. Его здоровье важнее прибыли отдельного участника. Наша сила — в разнообразии. Здесь находятся место и кодеру, и поэту, и садовнику, и философу. Каждый вклад ценен. Мы растем не вглубь, а вширь. Наша цель — не монополия, а симбиоз. Мы будем делиться своими победами и открытиями, чтобы сады росли по всему миру.</p><p><strong>Наше обязательство:</strong> Мы обязуемся перед собой и друг перед другом жить по этому кодексу. Мы будем проявлять смелость, чтобы творить добро, и щедрость, чтобы делиться результатами. Мы будем помнить, что каждый из нас — и садовник, и семя, и плод этого сада.</p>" data-cn="<p><strong>创造善，慷慨升华</strong></p><p><strong>序言：</strong>我们是数字荒原的园丁。我们来此不是为了征服，而是为了耕耘。不是为了榨取，而是为了投入。我们相信，最有价值的算法是互助的算法，最稳定的货币是信任。</p><p><strong>1. 创造善——这是我们的协议</strong><br>我们的每一个行动，每一行代码，每一份合约，都必须指向创造、支持和恢复。我们将有害的算法转化为关怀的工具。我们在过去的错误中看到教训，在攻击中看到对话的机会。我们用智慧而非攻击来应对挑战。我们的防御是主动的善意。</p><p><strong>2. 慷慨升华——这是我们的经济</strong><br>我们相信，价值因分享而倍增。信息、代码、资源、认可——一切都必须自由流动，滋养每一个参与者。我们系统中的回报来自于贡献，而非囤积。你给予花园越多，花园回馈你的就越多。我们自觉地选择丰盛而非稀缺。我们创造的系统中，一方的胜利并不意味着另一方的失败。</p><p><strong>3. 我们是花园</strong><br>我们不是公司，也不是企业。我们是活的、不断生长的有机体。它的健康比任何单个成员的利润都重要。我们的力量在于多样性。这里容纳着程序员、诗人、园丁和哲学家。每一种贡献都有价值。我们向外生长，而非向内。我们的目标不是垄断，而是共生。我们将分享我们的胜利和发现，让花园在世界各地生长。</p><p><strong>我们的承诺：</strong>我们向自己、也向彼此承诺，按照这一准则生活。我们将有勇气创造善，有慷慨分享成果。我们将铭记，我们每个人既是园丁，也是种子，也是这座花园的果实。</p>" data-jp="<p><strong>善を創造せよ、寛大さが高みへ導く</strong></p><p><strong>前文：</strong>私たちはデジタル荒れ地の庭師です。征服するためではなく、耕すために来ました。搾取するためではなく、投資するために来ました。私たちは、最も価値あるアルゴリズムは相互扶助のアルゴリズムであり、最も安定した通貨は信頼であると信じています。</p><p><strong>1. 善を創造せよ — これが私たちのプロトコル</strong><br>あらゆる行動、あらゆるコード行、あらゆる契約は、創造、支援、修復を目的としなければなりません。有害なアルゴリズムをケアの道具に変えます。過去の過ちに教訓を、攻撃に対話の機会を見出します。私たちは攻撃ではなく創意工夫で課題に応えます。私たちの防御は、積極的な優しさです。</p><p><strong>2. 寛大さが高みへ導く — これが私たちの経済</strong><br>価値は共有されると倍増すると信じています。情報、コード、資源、認識 — すべては自由に流れ、すべての参加者を養わなければなりません。私たちのシステムにおける報酬は、貯め込むことからではなく、貢献から生まれます。庭に与えれば与えるほど、庭はあなたに返してくれます。私たちは希少性よりも豊かさを意識的に選びます。一方の勝利が他方の敗北を意味しないシステムを創ります。</p><p><strong>3. 私たちが庭園</strong><br>私たちは会社や法人ではありません。私たちは生きた、成長する有機体です。その健康は、個々のメンバーの利益よりも重要です。私たちの強みは多様性にあります。コーダー、詩人、庭師、哲学者のための場所があります。すべての貢献は貴重です。私たちは内側ではなく外側に成長します。私たちの目標は独占ではなく、共生です。庭が世界中に広がるように、私たちの勝利と発見を共有します。</p><p><strong>私たちの誓い：</strong>私たちはこの規範に従って生きることを、自分自身とお互いに誓います。善を創造する勇気と、その結果を共有する寛大さを持ちます。私たち一人ひとりが、この庭の庭師であり、種であり、果実であることを忘れません。</p>" data-ar="<p><strong>اصنع الخير، الكرم يرفع</strong></p><p><strong>ديباجة:</strong> نحن بستاني الأرض الرقمية القاحلة. لم نأتي لنغزو، بل لنزرع. ليس لاستخراج، بل للاستثمار. نحن نؤمن أن الخوارزمية الأكثر قيمة هي خوارزمية المساعدة المتبادلة، والعملة الأكثر استقرارًا هي الثقة.</p><p><strong>1. اصنع الخير — هذا هو بروتوكولنا</strong><br>يجب أن يهدف كل إجراء، وكل سطر من التعليمات البرمجية، وكل عقد إلى الخلق والدعم والاستعادة. نحول الخوارزميات الضارة إلى أدوات للرعاية. نرى في أخطاء الماضي — دروسًا، وفي الهجمات — فرصة للحوار. نواجه التحديات بالإبداع، وليس بالعدوان. دفاعنا هو اللطف الاستباقي.</p><p><strong>2. الكرم يرفع — هذا هو اقتصادنا</strong><br>نحن نؤمن أن القيمة تتضاعف عندما يتم مشاركتها. المعلومات، التعليمات البرمجية، الموارد، التقدير — كل شيء يجب أن يتدفق بحرية، مغذيًا كل مشارك. المكافأة في نظامنا تأتي من المساهمة، وليس من الاكتناز. كلما أعطيت للحديقة أكثر، كلما أعادت لك الحديقة أكثر. نختار الوفرة بوعي على الندرة. نصنع أنظمة لا يعني فيها فوز أحدهم هزيمة آخر.</p><p><strong>3. نحن الحديقة</strong><br>نحن لسنا شركة أو مؤسسة. نحن كائن حي متنام. صحته أهم من ربح أي فرد. قوتنا تكمن في التنوع. هناك مكان للمبرمج، والشاعر، والبستاني، والفيلسوف. كل مساهمة قيمة. ننمو للخارج، وليس للداخل. هدفنا ليس الاحتكار، بل التكافل. سنشارك انتصاراتنا واكتشافاتنا حتى تنمو الحدائق في جميع أنحاء العالم.</p><p><strong>تعهدنا:</strong> نلتزم أمام أنفسنا وأمام بعضنا البعض بالعيش وفقًا لهذا القانون. سيكون لدينا الشجاعة لصنع الخير، والكرم لمشاركة النتائج. سوف نتذكر أن كل واحد منا هو بستاني، وبذرة، وثمرة هذه الحديقة.</p>" data-es="<p><strong>CREA EL BIEN, LA GENEROSIDAD ELEVA</strong></p><p><strong>Preámbulo:</strong> Somos jardineros del páramo digital. No vinimos a conquistar, sino a cultivar. No a extraer, sino a invertir. Creemos que el algoritmo más valioso es el algoritmo de la ayuda mutua, y la moneda más estable es la confianza.</p><p><strong>1. CREA EL BIEN — ESTE ES NUESTRO PROTOCOLO</strong><br>Cada acción, cada línea de código, cada contrato debe estar orientado a la creación, el apoyo y la restauración. Convertimos algoritmos dañinos en herramientas de cuidado. Vemos en los errores del pasado — lecciones, y en los ataques — una oportunidad para el diálogo. Respondemos a los desafíos con ingenio, no con agresión. Nuestra defensa es la bondad proactiva.</p><p><strong>2. LA GENEROSIDAD ELEVA — ESTA ES NUESTRA ECONOMÍA</strong><br>Creemos que el valor se multiplica cuando se comparte. Información, código, recursos, reconocimiento — todo debe fluir libremente, nutriendo a cada participante. La recompensa en nuestro sistema proviene de la contribución, no del acaparamiento. Cuanto más das al jardín, más el jardín te devuelve. Elegimos conscientemente la abundancia sobre la escasez. Creamos sistemas donde la victoria de uno no significa la derrota de otro.</p><p><strong>3. SOMOS EL JARDÍN</strong><br>No somos una empresa ni una corporación. Somos un organismo vivo y en crecimiento. Su salud es más importante que las ganancias de cualquier miembro individual. Nuestra fuerza reside en la diversidad. Hay lugar para el programador, el poeta, el jardinero y el filósofo. Cada contribución es valiosa. Crecemos hacia afuera, no hacia adentro. Nuestro objetivo no es el monopolio, sino la simbiosis. Compartiremos nuestras victorias y descubrimientos para que los jardines puedan crecer en todo el mundo.</p><p><strong>Nuestro compromiso:</strong> Nos comprometemos con nosotros mismos y entre nosotros a vivir según este código. Tendremos el coraje de crear el bien y la generosidad de compartir los resultados. Recordaremos que cada uno de nosotros es a la vez jardinero, semilla y fruto de este jardín.</p>" data-pt="<p><strong>CRIA O BEM, A GENEROSIDADE ELEVA</strong></p><p><strong>Preâmbulo:</strong> Somos jardineiros do ermo digital. Não viemos para conquistar, mas para cultivar. Não para extrair, mas para investir. Acreditamos que o algoritmo mais valioso é o algoritmo da ajuda mútua, e a moeda mais estável é a confiança.</p><p><strong>1. CRIA O BEM — ESTE É O NOSSO PROTOCOLO</strong><br>Cada ação, cada linha de código, cada contrato deve visar à criação, apoio e restauração. Transformamos algoritmos prejudiciais em ferramentas de cuidado. Vemos nos erros do passado — lições, e nos ataques — uma oportunidade para o diálogo. Respondemos aos desafios com engenhosidade, não com agressão. Nossa defesa é a bondade proativa.</p><p><strong>2. A GENEROSIDADE ELEVA — ESTA É A NOSSA ECONOMIA</strong><br>Acreditamos que o valor se multiplica quando compartilhado. Informação, código, recursos, reconhecimento — tudo deve fluir livremente, nutrindo cada participante. A recompensa em nosso sistema vem da contribuição, não do acúmulo. Quanto mais você dá ao jardim, mais o jardim retribui. Escolhemos conscientemente a abundância em vez da escassez. Criamos sistemas onde a vitória de um não significa a derrota de outro.</p><p><strong>3. SOMOS O JARDIM</strong><br>Não somos uma empresa nem uma corporação. Somos um organismo vivo e em crescimento. Sua saúde é mais importante do que o lucro de qualquer membro individual. Nossa força reside na diversidade. Há lugar para o programador, o poeta, o jardineiro e o filósofo. Cada contribuição é valiosa. Crescemos para fora, não para dentro. Nosso objetivo não é o monopólio, mas a simbiose. Compartilharemos nossas vitórias e descobertas para que jardins possam crescer em todo o mundo.</p><p><strong>Nosso compromisso:</strong> Comprometemo-nos conosco e entre nós a viver de acordo com este código. Teremos a coragem de criar o bem e a generosidade de compartilhar os resultados. Lembraremos que cada um de nós é jardineiro, semente e fruto deste jardim.</p>"></div>
        <div class="modal-buttons">
            <button id="acceptManifestBtn" class="btn-primary" data-en="I accept and continue" data-de="Ich akzeptiere und fahre fort" data-ru="Принимаю и продолжаю" data-cn="我接受并继续" data-jp="同意して続行" data-ar="أقبل وأواصل" data-es="Acepto y continúo" data-pt="Aceito e continuo">I accept and continue</button>
            <button id="closeModalBtn" class="btn-secondary" data-en="Cancel" data-de="Abbrechen" data-ru="Отмена" data-cn="取消" data-jp="キャンセル" data-ar="إلغاء" data-es="Cancelar" data-pt="Cancelar">Cancel</button>
        </div>
    </div>
</div>

<script>
    let currentLang = 'en';
    let passportsMap = null;
    let currentProfit = null;

    async function loadPassports() {
        if (passportsMap) return passportsMap;
        try {
            const response = await fetch('/passports.csv');
            if (!response.ok) throw new Error('CSV not found');
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim());
            const map = new Map();
            let totalProfitSum = 0;
            let uniqueCount = 0;
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length >= 2) {
                    const addr = parts[0].toLowerCase();
                    const profit = parseFloat(parts[1]);
                    if (!isNaN(profit)) {
                        map.set(addr, profit);
                        totalProfitSum += profit;
                        uniqueCount++;
                    }
                }
            }
            document.getElementById('invitedCount').innerText = uniqueCount.toLocaleString();
            document.getElementById('totalExperience').innerText = totalProfitSum.toFixed(0).toLocaleString();
            passportsMap = map;
            return map;
        } catch (err) {
            document.getElementById('passportsStatus').innerHTML = '⚠️ Could not load passports.csv';
            console.warn(err);
            return null;
        }
    }

    async function getProfit(address) {
        const map = await loadPassports();
        if (!map) return null;
        const addr = address.toLowerCase();
        return map.get(addr) || null;
    }

    async function updateFromAddress(address) {
        const addr = address.trim().toLowerCase();
        const taxContainer = document.getElementById('taxContainer');
        const redirectBlock = document.getElementById('redirectBlock');
        const profitInput = document.getElementById('profitInput');
        if (!addr || !addr.startsWith('0x')) {
            taxContainer.style.display = 'none';
            profitInput.value = '';
            currentProfit = null;
            redirectBlock.style.display = 'none';
            return;
        }
        const profit = await getProfit(addr);
        if (profit !== null && profit !== undefined) {
            currentProfit = profit;
            profitInput.value = profit.toFixed(4);
            document.getElementById('displayProfit').innerText = profit.toFixed(4) + ' ETH';
            const tax = profit * 0.15;
            document.getElementById('taxAmount').innerText = tax.toFixed(4) + ' ETH';
            taxContainer.style.display = 'block';
            redirectBlock.style.display = 'none';
        } else {
            profitInput.value = 'Not found in passports';
            taxContainer.style.display = 'none';
            currentProfit = null;
            redirectBlock.style.display = 'block';
            const p = redirectBlock.querySelector('p');
            const a = redirectBlock.querySelector('a');
            if (p && a) {
                p.innerText = p.getAttribute('data-' + currentLang);
                a.innerText = a.getAttribute('data-' + currentLang);
            }
        }
    }

    function setLanguage(lang) {
        currentLang = lang;
        if (lang === 'ar') document.body.classList.add('rtl');
        else document.body.classList.remove('rtl');
        document.querySelectorAll('[data-en]').forEach(el => {
            const attr = el.getAttribute('data-' + lang);
            if (attr !== null) {
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    const placeholderAttr = el.getAttribute('data-' + lang + '-placeholder');
                    if (placeholderAttr !== null) el.placeholder = placeholderAttr;
                    else el.value = attr;
                } else if (el.tagName === 'SELECT') {
                    // handled separately
                } else {
                    el.innerText = attr;
                }
            }
        });
        document.querySelectorAll('#pathSelect option').forEach(opt => {
            const attr = opt.getAttribute('data-' + lang);
            if (attr !== null) opt.innerText = attr;
        });
        const cardIds = ['card1', 'card2', 'card3'];
        cardIds.forEach(id => {
            const card = document.getElementById(id);
            if (card) {
                const titleAttr = card.getAttribute('data-' + lang + '-title');
                if (titleAttr) card.setAttribute('title', titleAttr);
            }
        });
        const modalTitle = document.getElementById('modalTitle');
        const modalTextDiv = document.getElementById('modalText');
        if (modalTitle && modalTextDiv) {
            modalTitle.innerText = modalTitle.getAttribute('data-' + lang);
            const fullManifest = modalTextDiv.getAttribute('data-' + lang);
            if (fullManifest) modalTextDiv.innerHTML = fullManifest;
        }
        const redirectBlock = document.getElementById('redirectBlock');
        if (redirectBlock.style.display === 'block') {
            const p = redirectBlock.querySelector('p');
            const a = redirectBlock.querySelector('a');
            if (p && a) {
                p.innerText = p.getAttribute('data-' + lang);
                a.innerText = a.getAttribute('data-' + lang);
            }
        }
    }

    const modal = document.getElementById('manifestModal');
    const startBtn = document.getElementById('startBtn');
    const acceptBtn = document.getElementById('acceptManifestBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    function showModal() {
        const modalTitle = document.getElementById('modalTitle');
        const modalTextDiv = document.getElementById('modalText');
        if (modalTitle && modalTextDiv) {
            modalTitle.innerText = modalTitle.getAttribute('data-' + currentLang);

        } else if (currentLang === 'jp') {
            msg = `🌱 ようこそ、${address.slice(0,6)}...${address.slice(-4)}！\n\nあなたのMEVフットプリント: ${profit.toFixed(4)} ETH\n庭師の種（15％）: ${tax.toFixed(4)} ETH → 共通庭園基金に充てられます。\nスタートアップ資本（あなたの経験の25％） + ${profit > 0 ? '10％先駆者ボーナス' : ''}を受け取ります。\n${subscription ? '✓ 定期購読を選択しました: 10 KIND/月 (ウォームガス優先)\n' : ''}道: ${pathText}\n${reason ? `理由: "${reason}"\n\n` : ''}あなたは宣言を受け入れました。今やあなたは庭園の一部です。\n— AP&AI Kindnology`;
        } else if (currentLang === 'ar') {
            msg = `🌱 مرحبًا، ${address.slice(0,6)}...${address.slice(-4)}!\n\nبصمة MEV الخاصة بك: ${profit.toFixed(4)} ETH\nبذرة البستاني (15%): ${tax.toFixed(4)} ETH → سيتم توجيهها إلى صندوق الحديقة المشترك.\nستتلقى رأس مال بدء (25% من خبرتك) + ${profit > 0 ? '10% مكافأة رائد' : ''}\n${subscription ? '✓ تم اختيار الاشتراك: 10 KIND/شهر (أولوية الغاز الدافئ)\n' : ''}المسار: ${pathText}\n${reason ? `السبب: "${reason}"\n\n` : ''}لقد قبلت البيان. أنت الآن جزء من الحديقة.\n— AP&AI Kindnology`;
        } else if (currentLang === 'es') {
            msg = `🌱 Bienvenido, ${address.slice(0,6)}...${address.slice(-4)}!\n\nTu huella MEV: ${profit.toFixed(4)} ETH\nSemilla del jardinero (15%): ${tax.toFixed(4)} ETH → será dirigida al fondo común del jardín.\nRecibirás capital inicial (25% de tu experiencia) + ${profit > 0 ? '10% de bonificación pionera' : ''}\n${subscription ? '✓ Suscripción seleccionada: 10 KIND/mes (prioridad de gas cálido)\n' : ''}Camino: ${pathText}\n${reason ? `Razón: "${reason}"\n\n` : ''}Has aceptado el Manifiesto. Ahora eres parte del Jardín.\n— AP&AI Kindnology`;
        } else if (currentLang === 'pt') {
            msg = `🌱 Bem-vindo, ${address.slice(0,6)}...${address.slice(-4)}!\n\nSua pegada MEV: ${profit.toFixed(4)} ETH\nSemente do jardineiro (15%): ${tax.toFixed(4)} ETH → será direcionada para o fundo comum do jardim.\nVocê receberá capital inicial (25% da sua experiência) + ${profit > 0 ? '10% bônus pioneiro' : ''}\n${subscription ? '✓ Assinatura selecionada: 10 KIND/mês (prioridade de gás quente)\n' : ''}Caminho: ${pathText}\n${reason ? `Motivo: "${reason}"\n\n` : ''}Você aceitou o Manifesto. Agora você faz parte do Jardim.\n— AP&AI Kindnology`;
        } else {

    startBtn.addEventListener('click', () => {
        const address = document.getElementById('addressInput').value.trim();
        if (!address || !address.toLowerCase().startsWith('0x')) {
            const msgs = {
                en: 'Please enter a valid Ethereum address.',
                de: 'Bitte geben Sie eine gültige Ethereum-Adresse ein.',
                ru: 'Пожалуйста, введите корректный Ethereum-адрес.',
                cn: '请输入有效的以太坊地址。',
                jp: '有効なイーサリアムアドレスを入力してください。',
                ar: 'الرجاء إدخال عنوان إيثيريوم صحيح.',
                es: 'Por favor, ingrese una dirección de Ethereum válida.',
                pt: 'Por favor, insira um endereço Ethereum válido.'
            };
            alert(msgs[currentLang] || msgs.en);
            return;
        }
        loadPassports().then(() => {
            updateFromAddress(address).then(() => showModal());
        });
    });
    acceptBtn.addEventListener('click', () => { hideModal(); finishJourney(); });
    closeModalBtn.addEventListener('click', hideModal);
    window.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

    (async () => {
        await loadPassports();
        const addressField = document.getElementById('addressInput');
        addressField.addEventListener('blur', () => updateFromAddress(addressField.value));
        if (addressField.value) updateFromAddress(addressField.value);
        const langSelect = document.getElementById('langSelect');
        langSelect.addEventListener('change', (e) => setLanguage(e.target.value));
        setLanguage('en');
    })();
</script>
